<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#C84B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Japan Trip">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Japan Trip 2026</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/print.css">
  <!-- NO external icon CDN — all icons are inline SVG via icons.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <!-- InstantDB real-time sync loader -->
  <script type="module">
    import { init, id, tx } from 'https://esm.sh/@instantdb/core@0.17.31';
    window._IDB = { init, id, tx };
    window.dispatchEvent(new CustomEvent('idb-ready'));
  </script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <style>
    /* ── Shell ──────────────────────────────────────────────── */
    html{height:-webkit-fill-available}
    body{min-height:100vh;min-height:-webkit-fill-available;background:var(--surface)}
    #app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--bg);position:relative}

    /* ── Header ─────────────────────────────────────────────── */
    #app-header{flex-shrink:0;background:var(--surface);border-bottom:1.5px solid var(--border);padding:env(safe-area-inset-top) 0 0}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px var(--s4) 12px}
    .header-sub{font-size:var(--text-xs);color:var(--text-muted)}
    .header-title{font-size:var(--text-lg);font-weight:500;color:var(--text-primary)}
    .header-countdown{font-size:var(--text-xs);font-weight:500;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--stamp-border);border-radius:var(--r-pill);padding:2px 8px;margin-top:4px;display:inline-block}
    .header-right{display:flex;align-items:center;gap:var(--s2)}
    #urgent-count{display:none;align-items:center;justify-content:center;background:var(--danger-text);color:#fff;border-radius:var(--r-pill);font-size:10px;font-weight:500;min-width:18px;height:18px;padding:0 5px}
    #sync-btn{display:flex;align-items:center;justify-content:center;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-sm);width:32px;height:32px;color:var(--text-secondary);cursor:pointer}
    #sync-btn:hover{background:var(--accent-subtle);color:var(--accent)}

    /* ── Stamp banner — PERSISTENT, never destroyed ──────────── */
    #stamp-persistent{flex-shrink:0;display:none}
    .stamp-banner{background:var(--surface);border-bottom:1.5px solid var(--stamp-border)}
    .stamp-header{display:flex;align-items:center;justify-content:space-between;padding:10px var(--s4);cursor:pointer;user-select:none;-webkit-user-select:none}
    .stamp-header-left{display:flex;align-items:baseline;gap:6px}
    .stamp-title{font-size:var(--text-sm);font-weight:500;color:var(--accent)}
    .stamp-sub{font-size:var(--text-xs);color:var(--text-muted)}
    .stamp-header-right{display:flex;align-items:center;gap:6px}
    .stamp-count{font-size:var(--text-sm);font-weight:500;color:var(--accent)}
    .stamp-sanzan{font-size:var(--text-xs);color:var(--text-muted)}
    .stamp-chevron{width:16px;height:16px;color:var(--text-muted)}
    .stamp-progress-bar{height:3px;background:var(--surface-raised)}
    .stamp-progress-fill{height:100%;background:var(--accent);transition:width .4s}
    .stamp-grid{display:flex;gap:8px;overflow-x:auto;padding:var(--s3) var(--s4);scrollbar-width:none}
    .stamp-grid::-webkit-scrollbar{display:none}
    .stamp-dot{width:52px;height:52px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;transition:all .2s;-webkit-tap-highlight-color:transparent}
    .stamp-dot--sanzan{border-color:var(--accent);border-width:2.5px}
    .stamp-dot--collected{background:var(--accent);border-color:var(--accent)}
    .stamp-dot--collected .stamp-kanji,.stamp-dot--collected .stamp-romaji{color:#fff}
    .stamp-kanji{font-size:12px;font-weight:500;color:var(--text-secondary);text-align:center;line-height:1.1}
    .stamp-romaji{font-size:7.5px;color:var(--text-muted);text-align:center;margin-top:1px}
    .stamp-tag{position:absolute;top:-5px;right:-3px;background:var(--accent);color:#fff;font-size:7px;font-weight:500;border-radius:3px;padding:1px 3px}
    .stamp-hint{font-size:10px;color:var(--text-muted);text-align:center;padding:0 var(--s3) var(--s3)}

    /* ── Conflict banner ─────────────────────────────────────── */
    .conflict-banner{background:var(--warning-bg);border-bottom:1.5px solid var(--warning-border);padding:var(--s2) var(--s4);display:none;align-items:center;justify-content:space-between;gap:var(--s3)}
    .conflict-msg{font-size:var(--text-xs);color:var(--warning-text);flex:1}
    .conflict-btns{display:flex;gap:var(--s2);flex-shrink:0}

    /* ── Screen ──────────────────────────────────────────────── */
    #screen-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-height:0;padding:var(--s3) 0 calc(64px + env(safe-area-inset-bottom))}
    #screen-content.map-active{padding:0;display:flex;flex-direction:column}

    /* ── Bottom nav ──────────────────────────────────────────── */
    #app-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 6px;border:none;background:none;color:var(--text-muted);font-size:var(--text-xs);font-weight:400;cursor:pointer;min-height:var(--nav-h);position:relative;transition:color .15s;font-family:var(--font)}
    .nav-btn .icon{transition:color .15s}
    .nav-btn.active{color:var(--accent);font-weight:500}
    .nav-btn.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:0 0 var(--r-sm) var(--r-sm)}

    /* ── Timeline accordion ─────────────────────────────────────── */
    .tl-day-header--tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:var(--s2);padding:12px var(--s3) 8px}
    .tl-day-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
    .tl-day-date{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
    .tl-day-title-text{font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tl-chevron{flex-shrink:0;color:var(--text-muted)}
    .tl-empty-hint{font-size:var(--text-xs);color:var(--text-muted);padding:4px var(--s3) 8px;font-style:italic}
    /* ── Timeline ─────────────────────────────────────────────── */

    /* Day block — bigger date, visually distinct (fix #4) */
    .tl-day-block{padding:var(--s5) var(--s4) var(--s2);margin-top:var(--s1)}
    .tl-day-block:first-of-type{padding-top:var(--s3)}
    .tl-day-header-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .tl-day-pill{background:var(--accent);border-radius:var(--r-pill);padding:4px 12px;display:inline-flex;align-items:center;flex-shrink:0}
    .tl-day-label{font-size:var(--text-sm);font-weight:500;color:#fff;letter-spacing:.04em}
    /* Bigger date (fix #4) */
    .tl-day-date{font-size:16px;font-weight:500;color:var(--text-primary);line-height:1.2}
    .tl-day-title-text{font-size:var(--text-xs);color:var(--text-muted);margin-bottom:var(--s2);padding-left:2px}
    .tl-day-divider{height:1px;background:var(--border-subtle);margin:0 var(--s4) var(--s1)}

    /* Stop rows */
    .tl-row{display:flex;cursor:pointer;padding:0 var(--s4) 0 var(--s3)}
    .tl-row:active{background:rgba(0,0,0,.03)}
    .tl-time{width:52px;flex-shrink:0;padding-top:16px;text-align:right;padding-right:var(--s2)}
    .tl-time-val{display:block;font-size:12px;font-weight:500;color:var(--text-primary);line-height:1.2}
    .tl-time-tz{display:block;font-size:9px;color:var(--text-muted)}
    .tl-connector{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:36px}
    /* Icon circle — SVG icons now show correctly (fix #3) */
    .tl-icon-circle{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:10px}
    .tl-icon-circle .icon{width:18px;height:18px}
    .tl-line{flex:1;width:1.5px;background:repeating-linear-gradient(to bottom,var(--border) 0,var(--border) 4px,transparent 4px,transparent 8px);margin:4px 0;min-height:20px}
    .tl-content{flex:1;padding:10px 0 20px var(--s3);min-width:0}
    .tl-name-row{display:flex;align-items:center;gap:6px}
    .tl-name{font-size:var(--text-base);font-weight:500;color:var(--text-primary)}
    .tl-stamp-dot{font-size:9px;font-weight:600;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--accent);color:var(--accent);background:transparent;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle;margin-left:4px}
    .tl-stamp-dot--on{background:var(--accent);color:#fff}
    .tl-activity{font-size:var(--text-sm);color:var(--text-secondary);margin-top:3px}
    /* Transport row — visible, with icon (fix #2) */
    .tl-transport{display:flex;align-items:flex-start;gap:5px;font-size:var(--text-sm);color:var(--text-primary);margin-top:5px}
    .tl-transport .icon{width:14px;height:14px;flex-shrink:0;margin-top:2px;color:var(--accent)}
    .tl-platform{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px;padding-left:19px}
    .tl-accommodation{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px;display:flex;align-items:center;gap:4px}
    .tl-accommodation .icon{width:12px;height:12px}
    .tl-note{font-size:var(--text-xs);color:var(--accent);font-style:italic;margin-top:3px}
    .tl-footer{display:flex;gap:var(--s2);margin-top:7px;flex-wrap:wrap}

    /* ── Weather strip ───────────────────────────────────────── */
    .wx-container{padding:0 var(--s4) var(--s2)}
    .wx-strip{display:flex;align-items:center;gap:var(--s3);background:var(--surface);border:1px solid var(--border-subtle);border-radius:var(--r-md);padding:6px var(--s3);overflow-x:auto;scrollbar-width:none}
    .wx-strip::-webkit-scrollbar{display:none}
    .wx-location{font-size:var(--text-xs);color:var(--text-muted);white-space:nowrap;flex-shrink:0}
    .wx-day{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
    .wx-date{font-size:9px;color:var(--text-muted);white-space:nowrap}
    .wx-icon{font-size:16px;color:var(--text-secondary)}
    .wx-temp{font-size:10px;font-weight:500;color:var(--text-primary);white-space:nowrap}

    /* ── Bottom sheet ────────────────────────────────────────── */
    .bs-detail{padding:var(--s4)}
    .bs-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:var(--s3)}
    .bs-name{font-size:var(--text-lg);font-weight:500;color:var(--text-primary);margin-bottom:4px}
    .bs-activity{font-size:var(--text-sm);color:var(--text-secondary);margin-bottom:var(--s3)}
    .bs-rows{display:flex;flex-direction:column;gap:10px;padding:var(--s3) 0;border-top:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s3)}
    .bs-row{display:flex;align-items:flex-start;gap:10px;font-size:var(--text-sm);color:var(--text-primary)}
    .bs-row .icon{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--text-muted)}
    .bs-transport-card{background:var(--accent-subtle);border:1px solid var(--stamp-border);border-radius:var(--r-md);padding:var(--s3);margin-bottom:var(--s3)}
    .bs-transport-card-title{font-size:var(--text-xs);font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--s2)}
    .bs-transport-row{display:flex;align-items:flex-start;gap:8px;font-size:var(--text-sm);color:var(--text-primary);margin-bottom:6px}
    .bs-transport-row:last-child{margin-bottom:0}
    .bs-transport-row .icon{width:16px;height:16px;color:var(--accent);flex-shrink:0;margin-top:2px}
    .bs-stamp-section{display:flex;align-items:center;gap:var(--s3);background:var(--stamp-bg);border:1px solid var(--stamp-border);border-radius:var(--r-md);padding:var(--s3);margin-bottom:var(--s3)}
    .bs-stamp-circle{width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .bs-stamp-circle--on{background:var(--accent)}
    .bs-stamp-circle--on .bs-stamp-kanji{color:#fff}
    .bs-stamp-kanji{font-size:14px;font-weight:500;color:var(--accent)}
    .bs-stamp-info{flex:1}
    .bs-stamp-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary)}
    .bs-stamp-status{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
    .bs-stamp-btn{flex-shrink:0;font-size:11px;padding:0 var(--s3);min-height:34px}
    .bs-actions{display:flex;flex-direction:column;gap:var(--s2)}
    .bs-full-btn{width:100%;justify-content:center}
    .bs-action-row{display:flex;gap:var(--s2)}
    .bs-action-row .btn{flex:1;justify-content:center;font-size:var(--text-sm)}
    .bs-edit-group{margin-bottom:var(--s3)}
    .bs-edit-label{display:block;font-size:var(--text-xs);font-weight:500;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .bs-input{width:100%;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:var(--text-sm);font-family:var(--font);color:var(--text-primary);min-height:40px;box-sizing:border-box}
    .bs-input:focus{outline:none;border-color:var(--accent);background:var(--surface)}
    .bs-textarea{width:100%;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:var(--text-sm);font-family:var(--font);color:var(--text-primary);resize:vertical;box-sizing:border-box}
    .bs-textarea:focus{outline:none;border-color:var(--accent)}
    .form-title{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);margin-bottom:var(--s3)}

    /* ── Sub-tabs ─────────────────────────────────────────────── */
    .sub-tab-bar{display:flex;border-bottom:1.5px solid var(--border);background:var(--surface)}
    .sub-tab{flex:1;padding:10px 4px;border:none;background:none;font-size:var(--text-sm);color:var(--text-muted);cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color .15s}
    .sub-tab--active{color:var(--accent);font-weight:500;border-bottom-color:var(--accent)}

    /* ── Bookings ────────────────────────────────────────────── */
    .booking-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s2);padding:var(--s3)}
    .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s3);display:flex;flex-direction:column;align-items:center;gap:2px}
    .stat-num{font-size:22px;font-weight:500;line-height:1}
    .stat-label{font-size:var(--text-xs);color:var(--text-muted)}
    .booking-list{display:flex;flex-direction:column;gap:var(--s2)}
    .booking-row{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg)}
    .booking-row-inner{display:flex;align-items:center;justify-content:space-between;padding:12px var(--s3);min-height:var(--touch);gap:var(--s2);cursor:pointer}
    .booking-name{font-weight:500;font-size:var(--text-sm);color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .booking-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;font-size:var(--text-xs);color:var(--text-muted)}

    /* ── Budget ──────────────────────────────────────────────── */
    .budget-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--s3);padding:var(--s3) 0 var(--s4)}
    .budget-total{flex:1}
    .budget-spent{font-size:22px;font-weight:500;color:var(--text-primary)}
    .budget-of{font-size:var(--text-xs);color:var(--text-muted);margin-top:2px}
    .budget-bar{height:5px;background:var(--surface-raised);border-radius:var(--r-pill);margin:6px 0;overflow:hidden}
    .budget-fill{height:100%;border-radius:var(--r-pill);transition:width .4s}
    .budget-remaining{font-size:var(--text-xs);color:var(--text-secondary)}
    .split-badge{display:inline-flex;align-items:center;gap:4px;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px 8px;font-size:var(--text-xs);color:var(--text-secondary);margin-top:4px}
    .split-badge .icon{width:12px;height:12px}
    .split-amount{font-weight:500;color:var(--accent)}
    .expense-section{margin-bottom:var(--s3)}
    .expense-day-header{display:flex;justify-content:space-between;font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 0;border-bottom:1px solid var(--border-subtle);margin-bottom:4px}
    .expense-row{display:flex;align-items:center;gap:var(--s2);padding:8px 0;border-bottom:1px solid var(--border-subtle);font-size:var(--text-sm)}
    .expense-cat{font-size:var(--text-xs);background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px 7px;color:var(--text-secondary);flex-shrink:0}
    .expense-info{flex:1;min-width:0}
    .expense-desc{color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .expense-split-line{font-size:var(--text-xs);color:var(--text-muted);margin-top:1px}
    .expense-amt{font-weight:500;color:var(--text-primary);flex-shrink:0;text-align:right}
    .expense-per{font-size:var(--text-xs);color:var(--text-muted);margin-top:1px;text-align:right}
    .expense-del{background:none;border:none;color:var(--border);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;min-height:32px;min-width:32px}
    .expense-del:hover{color:var(--danger-text)}
    .add-expense-form{background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s3);margin-top:var(--s3);display:flex;flex-direction:column;gap:var(--s2)}
    .add-expense-form .split-row{display:flex;align-items:center;gap:var(--s2);font-size:var(--text-sm);color:var(--text-secondary)}
    .add-expense-form .split-row .icon{width:15px;height:15px}

    /* ── Packing ─────────────────────────────────────────────── */
    .packing-header{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) 0 var(--s4);font-size:var(--text-sm);font-weight:500;color:var(--text-secondary)}
    .packing-section{margin-bottom:var(--s4)}
    .packing-cat-header{display:flex;justify-content:space-between;align-items:center;font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;padding:5px 0;border-bottom:1px solid var(--border-subtle);margin-bottom:4px}
    .packing-row{display:flex;align-items:center;gap:var(--s2);padding:9px 0;border-bottom:1px solid var(--border-subtle);min-height:44px}
    .packing-row--done .packing-item{text-decoration:line-through;color:var(--text-muted)}
    .packing-item{flex:1;font-size:var(--text-sm);color:var(--text-primary)}
    .packing-tag{font-size:9px;font-weight:500;background:var(--accent-subtle);color:var(--accent);border:1px solid var(--stamp-border);border-radius:var(--r-pill);padding:1px 6px;flex-shrink:0}
    .packing-del{background:none;border:none;color:var(--border);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;min-height:32px;min-width:32px;display:flex;align-items:center;justify-content:center}
    .packing-del:hover{color:var(--danger-text)}
    .packing-add-row{display:flex;align-items:center;gap:var(--s2);padding:6px 0}
    .packing-add-input{flex:1;background:var(--surface-raised);border:1px solid var(--border);border-radius:var(--r-md);padding:6px 10px;font-size:var(--text-sm);font-family:var(--font);color:var(--text-primary);min-height:36px}
    .packing-add-input:focus{outline:none;border-color:var(--accent)}
    .packing-add-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--r-md);padding:6px 12px;font-size:var(--text-sm);cursor:pointer;font-family:var(--font);min-height:36px;flex-shrink:0}

    /* ── Map ─────────────────────────────────────────────────── */
    .map-legend{display:flex;gap:var(--s3);flex-wrap:wrap;padding:var(--s3) var(--s3) 0}
    .map-legend-item{display:flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--text-secondary)}
    .map-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    #map-container{flex:1;margin:var(--s2) var(--s3);border-radius:var(--r-lg);overflow:hidden;border:1.5px solid var(--border)}

    /* ── SOS ─────────────────────────────────────────────────── */
    .sos-banner{display:flex;align-items:center;gap:var(--s3);background:var(--danger-bg);border:1.5px solid var(--danger-border);border-radius:var(--r-lg);padding:var(--s3);margin:var(--s3)}
    .sos-section{margin:0 var(--s3) var(--s4)}
    .sos-section-title{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:var(--s2)}
    .sos-item{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);margin-bottom:var(--s2);min-height:var(--touch)}
    .sos-item .icon{width:18px;height:18px;flex-shrink:0}

    /* ── SOS print content — hidden in normal view, shown only when printing ── */
    #sos-print-content { display: none; }

    /* ── Overnight accommodation card ───────────────────────── */
    .overnight-card{margin:0 var(--s3) var(--s2);background:var(--surface);border:1.5px solid var(--accent);border-radius:var(--r-lg);cursor:pointer;min-height:52px}
    .overnight-card:active{opacity:.8}
    .overnight-inner{display:flex;align-items:center;justify-content:space-between;padding:10px var(--s3);gap:var(--s2);min-height:44px}
    .overnight-inner .icon{color:var(--accent);flex-shrink:0}
    .overnight-label{font-size:var(--text-xs);color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .overnight-name{font-size:var(--text-sm);font-weight:500;color:var(--text-primary);margin-top:1px}

    /* ── Add stop button ─────────────────────────────────────── */
    .add-stop-btn{display:flex;align-items:center;gap:6px;margin:var(--s2) var(--s3) var(--s4);border:1.5px dashed var(--border);background:none;border-radius:var(--r-md);padding:8px var(--s3);font-size:var(--text-sm);color:var(--text-muted);cursor:pointer;font-family:var(--font);transition:border-color .15s,color .15s;width:calc(100% - 2*var(--s3))}
    .add-stop-btn:hover{border-color:var(--accent);color:var(--accent)}
    .add-stop-btn .icon{width:16px;height:16px}

    /* ── BS section heads ────────────────────────────────────── */
    .bs-section-head{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:var(--s4) 0 var(--s2);padding-bottom:var(--s1);border-bottom:1px solid var(--border-subtle)}

    /* ── Category chips ─────────────────────────────────────── */
    .cat-chip{display:inline-flex;align-items:center;border-radius:var(--r-pill);padding:1px 7px;font-size:9px;font-weight:500;letter-spacing:.03em;border:1px solid}
    .cat-chip--transport{background:rgba(43,65,176,.08);color:#2B41B0;border-color:rgba(43,65,176,.2)}
    .cat-chip--activity{background:rgba(42,122,75,.08);color:#2A7A4B;border-color:rgba(42,122,75,.2)}
    .cat-chip--jr{background:var(--accent-subtle);color:var(--accent);border-color:var(--stamp-border)}
    /* ── Train detail block in edit form ─────────────────────── */
    .bs-train-detail-block{background:var(--accent-subtle);border:1px solid var(--stamp-border);border-radius:var(--r-md);padding:var(--s3);margin-top:var(--s2)}
    /* ── Travelers / Settings ───────────────────────────────── */
    .traveler-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-raised);border:1.5px solid var(--border);border-radius:var(--r-pill);padding:4px 10px;font-size:var(--text-sm);color:var(--text-primary);font-weight:500}
    .traveler-chip--active{background:var(--accent);border-color:var(--accent);color:#fff}
    .traveler-chip-del{background:none;border:none;color:inherit;cursor:pointer;padding:0;font-size:14px;line-height:1;margin-left:2px;opacity:.7}
    .traveler-chip-del:hover{opacity:1}
    .split-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .settlement-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:var(--s3);margin-bottom:var(--s3)}
    .settlement-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:var(--text-sm)}
    .settlement-owed{font-size:var(--text-base);font-weight:500;color:var(--danger-text)}
    .settlement-settled{font-size:var(--text-base);font-weight:500;color:var(--success-text)}
    .settings-section{margin-bottom:var(--s5)}
    .settings-section-title{font-size:var(--text-xs);font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:var(--s3) 0 var(--s2);border-bottom:1px solid var(--border-subtle);margin-bottom:var(--s3)}
    .traveler-add-row{display:flex;gap:var(--s2);align-items:center;margin-top:var(--s3)}

    /* ── Empty ───────────────────────────────────────────────── */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--s8) var(--s4);text-align:center;color:var(--text-muted);gap:var(--s3)}
    .empty-title{font-size:var(--text-md);font-weight:500;color:var(--text-secondary)}
    .empty-sub{font-size:var(--text-sm)}
  </style>
</head>
<body>
<div id="app">
  <header id="app-header">
    <div class="header-inner">
      <div>
        <span class="header-sub">Apr 10–26 · 2 pax · Kumano Kodo</span>
        <p class="header-title" id="header-trip-name">Japan Trip</p>
        <span class="header-countdown" id="countdown"></span>
      </div>
      <div class="header-right">
        <span id="urgent-count"></span>
        <span id="sync-badge" class="badge badge-open">Offline</span>
        <button id="sync-btn" aria-label="Sync"></button>
      </div>
    </div>
  </header>

  <!-- Stamp banner lives here permanently — never destroyed on nav switch -->
  <div id="stamp-persistent"></div>

  <main id="screen-content"></main>

  <nav id="app-nav">
    <button class="nav-btn active" data-screen="itinerary" aria-label="Itinerary"></button>
    <button class="nav-btn" data-screen="map"       aria-label="Map"></button>
    <button class="nav-btn" data-screen="bookings"  aria-label="Bookings"></button>
    <button class="nav-btn" data-screen="sos"       aria-label="SOS Card"></button>
  </nav>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/toast.js"></script>
<script src="js/bottom-sheet.js"></script>
<script src="js/weather.js"></script>
<script src="js/sync.js"></script>
<script src="js/screens/itinerary.js"></script>
<script src="js/screens/map.js"></script>
<script src="js/screens/bookings.js"></script>
<script src="js/screens/sos.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const navCfg = [
    {screen:'itinerary', icon:'calendar', label:'Itinerary'},
    {screen:'map',       icon:'map',      label:'Map'},
    {screen:'bookings',  icon:'bookmark', label:'Bookings'},
    {screen:'sos',       icon:'shield',   label:'SOS'},
  ];
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    const {icon, label} = navCfg[i];
    btn.innerHTML = `${Icons[icon]('icon-lg')}<span>${label}</span>`;
  });
  document.getElementById('sync-btn').innerHTML = Icons.refresh('icon-sm');
});
</script>
</body>
</html>
